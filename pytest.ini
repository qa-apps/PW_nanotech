[pytest]
addopts = --base-url https://nanotech.icu --tracing retain-on-failure --screenshot only-on-failure --video retain-on-failure --browser chromium
testpaths = tests
python_files = test_*.py
python_classes = Test*
python_functions = test_*
markers =
    api: HTTP and API coverage for the live site
    llm: DeepEval-based LLM chatbot evaluations
